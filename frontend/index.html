<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini-Jarvis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Mini-Jarvis</h1>
      <p>Self-hosted assistant with RAG</p>

    <main id="chat"></main>

    <form id="chat-form">
      <input id="message" type="text" placeholder="Ask something..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
